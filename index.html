<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoGit Dashboard</title>
    <style>
        body {
            background-color: #121212; color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px; max-width: 600px; margin: auto;
        }
        .panel {
            background-color: #1e1e1e; border: 1px solid #333;
            padding: 20px; border-radius: 8px; margin-bottom: 20px;
        }
        input, button {
            width: 100%; padding: 10px; margin-top: 10px;
            background: #000; color: #00ff00; border: 1px solid #444;
            box-sizing: border-box; font-family: inherit;
        }
        button {
            background: #004400; cursor: pointer; font-weight: bold; border-color: #00ff00;
        }
        button:hover { background: #006600; }
        #terminal {
            background: #000; padding: 15px; border-left: 3px solid #00ff00;
            min-height: 100px; white-space: pre-wrap; font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h2>⚡ PicoGit Embedded Server</h2>
    
    <div class="panel">
        <label>Pico IP Address (Check your VS Code Terminal!):</label>
        <input type="text" id="picoIp" placeholder="e.g., 192.168.1.15" value="">
    </div>

    <div class="panel">
        <label>Target File:</label>
        <input type="text" id="fileName" value="sensor_data.txt">
        
        <label>Commit Message:</label>
        <input type="text" id="commitMsg" placeholder="What did you change?">
        
        <button onclick="sendCommit()">🚀 Push to Hardware</button>
    </div>

    <div class="panel">
        <label>Hardware Response Terminal:</label>
        <div id="terminal">Awaiting connection...</div>
    </div>

    <script>
        async function sendCommit() {
            const ip = document.getElementById('picoIp').value;
            const file = document.getElementById('fileName').value;
            const msg = document.getElementById('commitMsg').value;
            const term = document.getElementById('terminal');

            if(!ip) { term.innerHTML = "❌ Error: Please enter the Pico's IP address."; return; }
            if(!msg) { term.innerHTML = "❌ Error: Commit message is required."; return; }

            term.innerHTML = "Initiating handshake with " + ip + "...\n";

            try {
                // We added ?bypass=${Date.now()} to trick the browser's cache
const response = await fetch(`http://${ip}/api/commit?bypass=${Date.now()}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ file: file, message: msg, author: "Lead Presenter" })
});
               

                const data = await response.json();
                
                if(response.ok) {
                    term.innerHTML += `\n✅ SUCCESS: Bare-Metal Commit Executed.\n\n`;
                    term.innerHTML += `Commit ID : ${data.commit_id}\n`;
                    term.innerHTML += `Hash      : ${data.hash}\n`;
                    term.innerHTML += `Timestamp : ${data.timestamp}\n`;
                } else {
                    term.innerHTML += `\n❌ HARDWARE ERROR: ${data.error}`;
                }
            } catch (error) {
                term.innerHTML += `\n❌ NETWORK FAILURE: Cannot reach Pico. \n1. Are you on the same hotspot?\n2. Is the IP correct?\n3. Is userver.py running?`;
            }
        }
    </script>
</body>
</html>
